<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decart AI Live Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full text-center space-y-6">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
            Decart AI Real-Time Portal
        </h1>
        <p class="text-slate-400">Stream live video-to-video modifications using low-latency AI infrastructure.</p>

        <div class="flex flex-col sm:flex-row gap-3 bg-slate-900 p-4 rounded-xl border border-slate-800">
            <input type="text" id="promptInput" value="Convert the scene to a futuristic cyberpunk style" 
                   class="flex-1 px-4 py-3 rounded-lg bg-slate-950 border border-slate-700 text-white focus:outline-none focus:border-indigo-500">
            <button id="startBtn" class="bg-indigo-600 hover:bg-indigo-500 font-semibold px-6 py-3 rounded-lg transition-all">
                Start Live Stream
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
            <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden relative aspect-video">
                <span class="absolute top-3 left-3 bg-black/60 px-3 py-1 rounded-md text-xs font-medium z-10">Your Webcam</span>
                <video id="localVideo" autoplay playsinline muted class="w-full h-full object-cover"></video>
            </div>
            <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden relative aspect-video">
                <span class="absolute top-3 left-3 bg-indigo-600 px-3 py-1 rounded-md text-xs font-medium z-10">Decart AI Stream</span>
                <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover"></video>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const promptInput = document.getElementById('promptInput');

        startBtn.addEventListener('click', async () => {
            try {
                startBtn.disabled = true;
                startBtn.textContent = 'Connecting...';
                
                // Get your webcam video
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                localVideo.srcObject = stream;
                
                alert('Webcam connected! Connecting to Decart AI processing node...');
                // Streaming pipeline connection will be established here
                
            } catch (err) {
                console.error('Error reaching media hardware:', err);
                alert('Please allow camera access to run the real-time AI demo.');
                startBtn.disabled = false;
                startBtn.textContent = 'Start Live Stream';
            }
        });
    </script>
</body>
</html>
