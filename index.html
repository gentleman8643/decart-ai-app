<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decart AI Live Stream with Reference Image</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full text-center space-y-6">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
            Decart AI Reference Portal
        </h1>
        <p class="text-slate-400">Upload a reference image and type a prompt to guide the AI transformation.</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-900 p-4 rounded-xl border border-slate-800 text-left">
            <div class="md:col-span-2 space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Transformation Prompt</label>
                <input type="text" id="promptInput" value="Apply the outfit and style from the reference image onto me" 
                       class="w-full px-4 py-3 rounded-lg bg-slate-950 border border-slate-700 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Reference Image</label>
                <label class="flex flex-col items-center justify-center w-full h-12 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-950 hover:bg-slate-900 transition">
                    <div class="flex items-center space-x-2 text-slate-400">
                        <span class="text-sm" id="uploadStatus">Choose Image</span>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" />
                </label>
            </div>

            <div class="md:col-span-3 mt-2">
                <button id="startBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 font-semibold py-3 rounded-lg transition-all shadow-lg shadow-indigo-500/20">
                    Start Live Stream with Reference
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
            <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden relative aspect-video">
                <span class="absolute top-3 left-3 bg-black/60 px-3 py-1 rounded-md text-xs font-medium z-10">Your Webcam / Input</span>
                <video id="localVideo" autoplay playsinline muted class="w-full h-full object-cover"></video>
            </div>
            
            <div class="flex flex-col gap-2">
                <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden relative aspect-video flex-1">
                    <span class="absolute top-3 left-3 bg-indigo-600 px-3 py-1 rounded-md text-xs font-medium z-10">AI Modified Output</span>
                    <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover"></video>
                </div>
                <button id="pipBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-medium py-2 rounded-lg transition-all border border-slate-700 flex items-center justify-center gap-2">
                    🖥️ Pop Out Video (Picture-in-Picture)
                </button>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const imageInput = document.getElementById('imageInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const pipBtn = document.getElementById('pipBtn');
        const promptInput = document.getElementById('promptInput');

        let referenceImageBase64 = null;

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadStatus.textContent = file.name.substring(0, 15) + '...';
                
                // Compress the image down so it doesn't crash the browser pipeline
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        referenceImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        pipBtn.addEventListener('click', async () => {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    pipBtn.textContent = '🖥️ Pop Out Video (Picture-in-Picture)';
                } else {
                    if (remoteVideo.srcObject || remoteVideo.src) {
                        await remoteVideo.requestPictureInPicture();
                        pipBtn.textContent = '📥 Return Video to Page';
                    } else {
                        alert('Please start the stream first.');
                    }
                }
            } catch (err) {
                alert('Picture-in-Picture not supported for this stream type.');
            }
        });

        startBtn.addEventListener('click', async () => {
            try {
                startBtn.disabled = true;
                startBtn.textContent = 'Starting Camera...';
                
                // 1. Fire up camera immediately FIRST to lock permissions
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                localVideo.srcObject = stream;
                
                // Fallback display initialization
                remoteVideo.srcObject = stream;

                if (!referenceImageBase64) {
                    alert('Camera active! Please select a reference image to begin AI transformation styling.');
                    startBtn.disabled = false;
                    startBtn.textContent = 'Start Live Stream with Reference';
                    return;
                }

                startBtn.textContent = 'Connecting to Decart GPU...';
                
                // 2. Send the compressed, lightweight data packet
                const response = await fetch('/api/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: referenceImageBase64,
                        prompt: promptInput.value
                    })
                });

                const sessionData = await response.json();

                if (sessionData.error) {
                    console.log('Backend status:', sessionData.error);
                }

                if (sessionData.streamUrl) {
                    remoteVideo.src = sessionData.streamUrl;
                }
                
                startBtn.textContent = 'Stream Active';
                
            } catch (err) {
                console.error(err);
                alert('Could not open webcam. Ensure no other applications are using it.');
                startBtn.disabled = false;
                startBtn.textContent = 'Start Live Stream with Reference';
            }
        });
    </script>
</body>
</html>
